[extend]
  useDefault = true            # use gitleaks built-in ruleset (covers AWS, GCP, GitHub, etc.)

[[rules]]
  id = "custom-db-password"
  description = "Detects hardcoded database passwords"
  regex = '''(?i)(db_password|database_password|db_pass)\s*=\s*['"]?[^\s'"]+'''
  tags = ["secret", "database"]

[allowlist]
  paths = [
    ".gitleaks.toml",          # ignore this config file itself
    "vault/init/seed.sh",      # seed script contains placeholder values only
  ]